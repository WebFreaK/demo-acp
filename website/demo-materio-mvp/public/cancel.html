<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paiement annulé — Matério</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #f5f5f5; color: #1d1d1b; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .topbar { width: 100%; height: 36px; background: #1a1a1a; position: fixed; top: 0; }
    .header-strip { width: 100%; height: 4px; background: #C8102E; position: fixed; top: 36px; }
    .container { text-align: center; padding: 40px 24px; max-width: 520px; }
    .icon { font-size: 80px; margin-bottom: 24px; }
    h1 { font-size: 28px; margin-bottom: 8px; color: #f59e0b; font-weight: 700; }
    .subtitle { color: #666; font-size: 16px; line-height: 1.6; margin-bottom: 8px; }
    .note { color: #999; font-size: 14px; margin-bottom: 24px; }
    .back-link { display: inline-flex; align-items: center; gap: 6px; color: #C8102E; text-decoration: none; font-weight: 600; font-size: 15px; padding: 10px 20px; border: 2px solid #C8102E; border-radius: 8px; transition: all 0.2s; }
    .back-link:hover { background: #C8102E; color: #fff; }
    .logo { font-size: 32px; font-weight: 800; color: #C8102E; margin-bottom: 32px; letter-spacing: -0.5px; }
  </style>
</head>
<body>
  <div class="topbar"></div>
  <div class="header-strip"></div>
  <div class="container">
    <div class="logo">matério</div>
    <div class="icon">🔙</div>
    <h1>Paiement annulé</h1>
    <p class="subtitle">Votre commande n'a pas été complétée. Aucun montant n'a été facturé.</p>
    <p class="note">Vos articles sont toujours dans votre panier.</p>
    <a href="/" class="back-link">← Retour à l'assistant</a>
  </div>
</body>
</html>
