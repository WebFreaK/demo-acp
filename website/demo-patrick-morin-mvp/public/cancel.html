<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">

  <title>Paiement annulé — Patrick Morin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #1a1a2e; color: #f1f5f9; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { text-align: center; padding: 40px; max-width: 500px; }
    .icon { font-size: 80px; margin-bottom: 24px; }
    h1 { font-size: 28px; margin-bottom: 12px; color: #f59e0b; }
    p { color: #94a3b8; font-size: 16px; line-height: 1.6; margin-bottom: 16px; }
    a { color: #19c37d; text-decoration: none; font-weight: 600; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🔙</div>
    <h1>Paiement annulé</h1>
    <p>Votre commande n'a pas été complétée. Aucun montant n'a été facturé.</p>
    <p>Vos articles sont toujours dans votre panier.</p>
    <p><a href="/">← Retour à l'assistant</a></p>

</html>
