<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paiement réussi — Patrick Morin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #1a1a2e; color: #f1f5f9; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { text-align: center; padding: 40px; max-width: 500px; }
    .check { font-size: 80px; margin-bottom: 24px; animation: scaleIn 0.5s ease; }
    h1 { font-size: 28px; margin-bottom: 12px; color: #22c55e; }
    p { color: #94a3b8; font-size: 16px; line-height: 1.6; margin-bottom: 16px; }
    .order-box { background: rgba(255,255,255,0.04); border-radius: 12px; padding: 20px; margin: 24px 0; text-align: left; font-size: 14px; line-height: 2; color: #94a3b8; }
    a { color: #19c37d; text-decoration: none; font-weight: 600; }
    a:hover { text-decoration: underline; }
    @keyframes scaleIn { from { transform: scale(0.3); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="check">✅</div>
    <h1>Paiement réussi!</h1>
    <p>Votre commande Patrick Morin a été confirmée.</p>
    <div class="order-box">
      📧 Un courriel de confirmation sera envoyé.<br>
      📍 Vos articles seront prêts pour le ramassage en magasin.<br>
      📞 Patrick Morin Laval — (450) 688-3030
    </div>
    <p>Merci d'avoir magasiné chez <strong style="color:#e30613">Patrick Morin</strong>! 🏠</p>
    <p><a href="/">← Retour à l'assistant</a></p>
  </div>
</body>
</html>
